apiVersion: batch/v1
kind: Job
metadata:
  name: superset-init
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: superset-init
        component: superset
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-metadata 5432; do
                echo "waiting for postgres-metadata..."
                sleep 2
              done
              until nc -z postgis 5432; do
                echo "waiting for postgis..."
                sleep 2
              done
      containers:
        - name: init
          image: jmeegan607/geoset
          command: ["/app/docker/docker-init-geoset.sh"]
          envFrom:
            - configMapRef:
                name: superset-env
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: superset-secrets
                  key: DATABASE_PASSWORD
            - name: EXAMPLES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: superset-secrets
                  key: EXAMPLES_PASSWORD
            - name: SUPERSET_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: superset-secrets
                  key: SUPERSET_SECRET_KEY
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: superset-secrets
                  key: ADMIN_PASSWORD
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi

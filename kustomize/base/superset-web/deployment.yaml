apiVersion: apps/v1
kind: Deployment
metadata:
  name: superset-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: superset-web
  template:
    metadata:
      labels:
        app: superset-web
        component: superset
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-metadata 5432; do
                echo "waiting for postgres-metadata..."
                sleep 2
              done
      containers:
        - name: superset
          image: jmeegan607/geoset
          envFrom:
            - configMapRef:
                name: superset-env
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: superset-secrets
                  key: DATABASE_PASSWORD
            - name: EXAMPLES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: superset-secrets
                  key: EXAMPLES_PASSWORD
            - name: SUPERSET_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: superset-secrets
                  key: SUPERSET_SECRET_KEY
            - name: MAPBOX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: superset-secrets
                  key: MAPBOX_API_KEY
            - name: SERVER_WORKER_AMOUNT
              value: "4"
          ports:
            - containerPort: 8088
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 60
            periodSeconds: 30

apiVersion: batch/v1
kind: Job
metadata:
  name: sample-data-ingest
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: sample-data-ingest
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgis 5432; do
                echo "waiting for postgis..."
                sleep 2
              done
      containers:
        - name: ingest
          image: ebienstock/geoset:data-ingest-latest
          env:
            - name: DB_HOST
              value: "postgis"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "geoset"
            - name: DB_USER
              value: "geoset"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: superset-secrets
                  key: POSTGIS_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

apiVersion: apps/v1
kind: Deployment
metadata:
  name: superset-web
spec:
  replicas: 2
  template:
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-metadata 5432; do
                echo "waiting for postgres-metadata..."
                sleep 2
              done
              until nc -z redis 6379; do
                echo "waiting for redis..."
                sleep 2
              done
      containers:
        - name: superset
          imagePullPolicy: Always
          volumeMounts:
            - name: config-overrides
              mountPath: /app/docker/pythonpath_dev/superset_config_docker.py
              subPath: superset_config_docker.py
      volumes:
        - name: config-overrides
          configMap:
            name: superset-config-overrides

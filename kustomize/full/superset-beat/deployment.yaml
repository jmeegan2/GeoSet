apiVersion: apps/v1
kind: Deployment
metadata:
  name: superset-beat
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: superset-beat
  template:
    metadata:
      labels:
        app: superset-beat
        component: superset
    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do
                echo "waiting for redis..."
                sleep 2
              done
      containers:
        - name: beat
          image: jmeegan607/geoset:chromium
          command: ["celery", "--app=superset.tasks.celery_app:app",
                    "beat", "--loglevel=INFO",
                    "--schedule=/tmp/celerybeat-schedule"]
          envFrom:
            - configMapRef:
                name: superset-env
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: superset-secrets
                  key: DATABASE_PASSWORD
            - name: EXAMPLES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: superset-secrets
                  key: EXAMPLES_PASSWORD
            - name: SUPERSET_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: superset-secrets
                  key: SUPERSET_SECRET_KEY
            - name: MAPBOX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: superset-secrets
                  key: MAPBOX_API_KEY
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi

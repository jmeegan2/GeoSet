apiVersion: batch/v1
kind: Job
metadata:
  name: wildfire-alert-bootstrap
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: wildfire-alert-bootstrap
        component: superset
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-superset
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z superset-web 8088; do
                echo "waiting for superset-web..."
                sleep 5
              done
      containers:
        - name: bootstrap
          image: jmeegan607/geoset
          command: ["/bin/bash", "/scripts/bootstrap-alert.sh"]
          envFrom:
            - configMapRef:
                name: superset-env
          env:
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: superset-secrets
                  key: ADMIN_PASSWORD
            - name: WILDFIRE_ALERT_RECIPIENT
              value: "jmeegan@teamraft.com"
          volumeMounts:
            - name: bootstrap-script
              mountPath: /scripts
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
      volumes:
        - name: bootstrap-script
          configMap:
            name: wildfire-alert-bootstrap
            defaultMode: 0755
